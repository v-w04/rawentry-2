<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva entrada</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block}
</style>
</head>
<body>
<canvas id="dial"></canvas>
<script>
var isEncom = localStorage.getItem('lifeos_theme') === 'encom';

var BG         = isEncom ? '#000000' : '#09090f';
var SECTOR     = isEncom ? '#000f14' : '#1e2026';
var SECTOR_H   = isEncom ? '#002830' : '#373c46';
var STROKE_C   = isEncom ? 'rgba(0,238,238,0.15)' : 'rgba(255,255,255,0.08)';
var TEXT_C     = isEncom ? 'rgba(0,238,238,0.9)'  : 'rgba(255,255,255,0.85)';
var ACT_FILL   = isEncom ? '#001820' : 'rgba(34,211,238,0.12)';
var ACT_H      = isEncom ? '#003040' : 'rgba(34,211,238,0.3)';
var RAW_FILL   = isEncom ? '#002830' : '#1e2060';
var RAW_STROKE = isEncom ? '#00eeee' : 'rgba(99,102,241,0.6)';
var RAW_TEXT   = isEncom ? '#00eeee' : '#A5B4FC';
var SUB_FILL   = isEncom ? '#001018' : '#181c24';
var SUB_H      = isEncom ? '#002030' : '#2a3040';

document.body.style.background = BG;

var items = [
  {key:'apartado',     color:'#4ADE80', label:'Apartado',   icon:'💰'},
  {key:'bancos',       color:'#F59E0B', label:'Bancos',     icon:'🏦'},
  {key:'entrenamiento',color:'#FB923C', label:'Entrena',    icon:'💪'},
  {key:'nutricion',    color:'#4ADE80', label:'Nutrición',  icon:'🥗'},
  {key:'patrimonio',   color:'#C4B5FD', label:'Patrimonio', icon:'🏛'},
  {key:'pensamiento',  color:'#F9A8D4', label:'Pensa',      icon:'💭'},
  {key:'persona',      color:'#93C5FD', label:'Persona',    icon:'👥'},
  {key:'editar',       color:'#94A3B8', label:'Editar',     icon:'✏️'},
  {key:'salud',        color:'#FCA5A5', label:'Salud',      icon:'❤️'},
  {key:'activity',     color:'#22D3EE', label:'Activity',   icon:'⚡'},
];
var subItems = [
  {key:'libro', color:'#EC4899', label:'Libros',     icon:'📚'},
  {key:'movie', color:'#F59E0B', label:'Movies',     icon:'🎬'},
  {key:'norut', color:'#8B5CF6', label:'Pendientes', icon:'📋'},
];

function elegir(modo){
  sessionStorage.setItem('dial_modo', modo);
  location.href = 'index.html';
}

var canvas = document.getElementById('dial');
var ctx = canvas.getContext('2d');
var W, CX, CY, Rout, Rin, R2out, R2in, RAWR;
var hovered = -1, hoveredSub = -1, actOpen = false;

function resize(){
  var size = Math.min(window.innerWidth, window.innerHeight) * 0.95;
  canvas.width = size; canvas.height = size;
  W = size; CX = CY = size / 2;
  Rout = size * 0.364; Rin = size * 0.136;
  R2out = size * 0.495; R2in = size * 0.400;
  RAWR = size * 0.128;
  draw();
}

function draw(){
  var n = items.length;
  var actIdx = 9; // activity siempre en idx 9
  var subSpan = Math.PI * 0.55;
  var Rmid = (Rout + Rin) / 2;
  var R2mid = (R2out + R2in) / 2;

  // Fondo
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, W);

  // Vignette
  var vg = ctx.createRadialGradient(CX,CY,Rin*0.5,CX,CY,Rout*1.1);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.beginPath(); ctx.arc(CX,CY,Rout*1.1,0,Math.PI*2);
  ctx.fillStyle=vg; ctx.fill();

  // Sectores
  items.forEach(function(item, i){
    var isAct = i === actIdx;
    var isHov = hovered === i;
    var a1 = i/n*Math.PI*2 - Math.PI/2;
    var a2 = (i+1)/n*Math.PI*2 - Math.PI/2;
    ctx.beginPath();
    ctx.arc(CX,CY,Rout,a1,a2);
    ctx.arc(CX,CY,Rin,a2,a1,true);
    ctx.closePath();
    ctx.fillStyle = isAct ? (isHov?ACT_H:ACT_FILL) : (isHov?SECTOR_H:SECTOR);
    ctx.fill();
    ctx.strokeStyle = isHov ? (isEncom?'rgba(0,238,238,0.4)':STROKE_C) : STROKE_C;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    var am = (i+0.5)/n*Math.PI*2 - Math.PI/2;
    var mx = CX + Rmid*Math.cos(am);
    var my = CY + Rmid*Math.sin(am);
    var fs = W*0.046;
    ctx.font = fs+'px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(item.icon, mx, my - fs*0.3);
    ctx.font = 'bold '+(W*0.021)+'px system-ui';
    ctx.fillStyle = TEXT_C;
    ctx.fillText(item.label, mx, my + fs*0.55);
  });

  // Sub-sectores
  if(actOpen){
    subItems.forEach(function(item, j){
      var actA = (actIdx+0.5)/n*Math.PI*2 - Math.PI/2;
      var aS = actA - subSpan/2 + j*subSpan/3;
      var aE = actA - subSpan/2 + (j+1)*subSpan/3;
      var isHov = hoveredSub === j;
      ctx.beginPath();
      ctx.arc(CX,CY,R2out,aS,aE);
      ctx.arc(CX,CY,R2in,aE,aS,true);
      ctx.closePath();
      ctx.fillStyle = isHov ? SUB_H : SUB_FILL;
      ctx.fill();
      ctx.strokeStyle = STROKE_C; ctx.lineWidth=1.5; ctx.stroke();
      var am = (aS+aE)/2;
      var mx = CX + R2mid*Math.cos(am);
      var my = CY + R2mid*Math.sin(am);
      var fs = W*0.042;
      ctx.font = fs+'px serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(item.icon, mx, my - fs*0.3);
      ctx.font = 'bold '+(W*0.019)+'px system-ui';
      ctx.fillStyle = item.color;
      ctx.fillText(item.label, mx, my + fs*0.55);
    });
  }

  // Glow centro
  var glow = ctx.createRadialGradient(CX,CY,0,CX,CY,RAWR*1.5);
  glow.addColorStop(0, isEncom?'rgba(0,238,238,0.2)':'rgba(99,102,241,0.25)');
  glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(CX,CY,RAWR*1.5,0,Math.PI*2);
  ctx.fillStyle=glow; ctx.fill();

  // Círculo RAW
  ctx.beginPath(); ctx.arc(CX,CY,RAWR,0,Math.PI*2);
  ctx.fillStyle=RAW_FILL; ctx.fill();
  ctx.strokeStyle=RAW_STROKE; ctx.lineWidth=2.5; ctx.stroke();

  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=RAW_TEXT;
  ctx.font=(W*0.07)+'px serif';
  ctx.fillText('⇄',CX,CY-W*0.022);
  ctx.font='bold '+(W*0.03)+'px system-ui';
  ctx.fillText('RAW',CX,CY+W*0.046);
}

function getHit(ex, ey){
  var n=items.length, actIdx=9, subSpan=Math.PI*0.55;
  var dx=ex-CX, dy=ey-CY, dist=Math.sqrt(dx*dx+dy*dy);
  var angle=Math.atan2(dy,dx);
  if(dist<RAWR) return {zone:'raw'};
  if(actOpen && dist>=R2in && dist<=R2out){
    var actA=(actIdx+0.5)/n*Math.PI*2-Math.PI/2;
    for(var j=0;j<subItems.length;j++){
      var aS=actA-subSpan/2+j*subSpan/3, aE=actA-subSpan/2+(j+1)*subSpan/3;
      var a=angle;
      while(a<aS-Math.PI) a+=Math.PI*2;
      while(a>aS+Math.PI) a-=Math.PI*2;
      if(a>=aS&&a<=aE) return {zone:'sub',idx:j};
    }
  }
  if(dist>=Rin&&dist<=Rout){
    var norm=angle+Math.PI/2; if(norm<0)norm+=Math.PI*2;
    var idx=Math.floor(norm/(Math.PI*2)*n);
    if(idx>=0&&idx<n) return {zone:'sector',idx:idx};
  }
  return {zone:'bg'};
}

canvas.addEventListener('mousemove',function(e){
  var r=canvas.getBoundingClientRect();
  var sx=canvas.width/r.width, sy=canvas.height/r.height;
  var hit=getHit((e.clientX-r.left)*sx,(e.clientY-r.top)*sy);
  var nh=hit.zone==='sector'?hit.idx:-1, nhs=hit.zone==='sub'?hit.idx:-1;
  if(nh!==hovered||nhs!==hoveredSub){
    hovered=nh; hoveredSub=nhs;
    canvas.style.cursor=hit.zone!=='bg'?'pointer':'default';
    draw();
  }
});

canvas.addEventListener('click',function(e){
  var r=canvas.getBoundingClientRect();
  var sx=canvas.width/r.width, sy=canvas.height/r.height;
  var hit=getHit((e.clientX-r.left)*sx,(e.clientY-r.top)*sy);
  if(hit.zone==='raw') elegir('nueva');
  else if(hit.zone==='sector'){
    if(items[hit.idx].key==='activity'){actOpen=!actOpen;draw();}
    else elegir(items[hit.idx].key);
  }
  else if(hit.zone==='sub') elegir(subItems[hit.idx].key);
  else location.href='index.html';
});

canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  var t=e.changedTouches[0], r=canvas.getBoundingClientRect();
  var sx=canvas.width/r.width, sy=canvas.height/r.height;
  var hit=getHit((t.clientX-r.left)*sx,(t.clientY-r.top)*sy);
  if(hit.zone==='raw') elegir('nueva');
  else if(hit.zone==='sector'){
    if(items[hit.idx].key==='activity'){actOpen=!actOpen;draw();}
    else elegir(items[hit.idx].key);
  }
  else if(hit.zone==='sub') elegir(subItems[hit.idx].key);
  else location.href='index.html';
},{passive:false});

document.addEventListener('keydown',function(e){if(e.key==='Escape')location.href='index.html';});
window.addEventListener('resize',resize);
resize();
</script>
</body>
</html>
