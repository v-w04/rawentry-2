<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva entrada</title>
<style>
html, body { background: #09090f !important; color: #e0e0e0; }
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#09090f !important;overflow:hidden;font-family:system-ui,-apple-system,sans-serif}
body{display:flex;align-items:center;justify-content:center}
#dial-wrap{position:relative;width:min(1000px,95vmin);height:min(1000px,95vmin);flex-shrink:0}
svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible}
</style>
</head>
<body>
<div id="dial-wrap"></div>
<script>
var isEncom = localStorage.getItem('lifeos_theme') === 'encom';
if(isEncom){
  document.body.style.background = '#000000';
  var lnk=document.createElement('link');lnk.rel='stylesheet';
  lnk.href='https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;600;700&display=swap';
  document.head.appendChild(lnk);
}

// Colores — valores base primero, luego override si ENCOM
var SECTOR_FILL  = isEncom ? '#000f14'              : '#1e2026';
var SECTOR_HOVER = isEncom ? '#002830'              : '#373c46';
var STROKE       = isEncom ? 'rgba(0,238,238,0.2)'  : 'rgba(255,255,255,0.06)';
var BG_CIRCLE    = isEncom ? '#00050a'              : '#0a0c12';
var TEXT_COLOR   = isEncom ? 'rgba(0,238,238,0.85)' : 'rgba(255,255,255,0.85)';
var RAW_FILL     = isEncom ? '#002830'              : '#1e2060';
var RAW_STROKE   = isEncom ? '#00eeee'              : 'rgba(99,102,241,0.55)';
var RAW_TEXT     = isEncom ? '#00eeee'              : '#A5B4FC';
var ACT_FILL     = isEncom ? 'rgba(0,40,50,0.5)'    : 'rgba(34,211,238,0.12)';
var ACT_HOVER    = isEncom ? '#003840'              : 'rgba(34,211,238,0.28)';

var NS='http://www.w3.org/2000/svg';
var n=10,CX=500,CY=500,SIZE=1000;
var R_OUT=364,R_IN=136,R_CENT=2/3*(Math.pow(R_OUT,3)-Math.pow(R_IN,3))/(Math.pow(R_OUT,2)-Math.pow(R_IN,2));
var R2_OUT=500,R2_IN=400,R2_CENT=2/3*(Math.pow(R2_OUT,3)-Math.pow(R2_IN,3))/(Math.pow(R2_OUT,2)-Math.pow(R2_IN,2));
var RAW_R=128;

var ICONS={
  apartado:'<path d="M12 2C8.5 2 6 4.5 6 7c0 1.5.7 2.8 1.8 3.7L7 14h10l-.8-3.3C17.3 9.8 18 8.5 18 7c0-2.5-2.5-5-6-5zm-2 14v1a2 2 0 004 0v-1H10z" fill="currentColor"/>',
  bancos:'<path d="M3 21h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18V7H3v2zm9-8L2 7h20L12 1z" fill="currentColor"/>',
  entrenamiento:'<path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z" fill="currentColor"/>',
  nutricion:'<path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7H1v-2h15.03v2zm0-4H1v-2h15.03v2z" fill="currentColor"/>',
  patrimonio:'<path d="M4 10v7h3v-7H4zm6.5 0v7h3v-7h-3zM2 22h19v-3H2v3zm15-12v7h3v-7h-3zM11.5 1L2 6v2h19V6l-9.5-5z" fill="currentColor"/>',
  pensamiento:'<path d="M11.5 2C6.81 2 3 5.81 3 10.5S6.81 19 11.5 19h.5v3c4.86-2.34 8-7 8-11.5C20 5.81 16.19 2 11.5 2zm1 14.5h-2v-2h2v2zm0-4h-2c0-3.25 3-3 3-5 0-1.1-.9-2-2-2s-2 .9-2 2h-2c0-2.21 1.79-4 4-4s4 1.79 4 4c0 2.5-3 2.75-3 5z" fill="currentColor"/>',
  persona:'<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor"/>',
  editar:'<path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/>',
  salud:'<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor"/>',
  activity:'<path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z" fill="currentColor"/>',
  libro:'<path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z" fill="currentColor"/>',
  movie:'<path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z" fill="currentColor"/>',
  norut:'<path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z" fill="currentColor"/>'
};

var items=[
  {key:'apartado', ico:'apartado', color:'#4ADE80', label:'Apartado'},
  {key:'bancos', ico:'bancos', color:'#F59E0B', label:'Bancos'},
  {key:'entrenamiento', ico:'entrenamiento', color:'#FB923C', label:'Entrena'},
  {key:'nutricion', ico:'nutricion', color:'#4ADE80', label:'Nutrición'},
  {key:'patrimonio', ico:'patrimonio', color:'#C4B5FD', label:'Patrimonio'},
  {key:'pensamiento', ico:'pensamiento', color:'#F9A8D4', label:'Pensa'},
  {key:'persona', ico:'persona', color:'#93C5FD', label:'Persona'},
  {key:'editar', ico:'editar', color:'#94A3B8', label:'Editar'},
  {key:'salud', ico:'salud', color:'#FCA5A5', label:'Salud'},
  {key:'activity', ico:'activity', color:'#22D3EE', label:'Activity'},
];
var subItems=[
  {key:'libro', ico:'libro', color:'#EC4899', label:'Libros'},
  {key:'movie', ico:'movie', color:'#F59E0B', label:'Movies'},
  {key:'norut', ico:'norut', color:'#8B5CF6', label:'Pendientes'},
];

function elegir(modo){
  sessionStorage.setItem('dial_modo', modo);
  history.back();
}
function sp(i,ro,ri){
  var a1=i/n*2*Math.PI-Math.PI/2, a2=(i+1)/n*2*Math.PI-Math.PI/2;
  var x1=CX+ro*Math.cos(a1),y1=CY+ro*Math.sin(a1);
  var x2=CX+ro*Math.cos(a2),y2=CY+ro*Math.sin(a2);
  var x3=CX+ri*Math.cos(a2),y3=CY+ri*Math.sin(a2);
  var x4=CX+ri*Math.cos(a1),y4=CY+ri*Math.sin(a1);
  return 'M'+x1.toFixed(2)+','+y1.toFixed(2)+' A'+ro+','+ro+',0,0,1,'+x2.toFixed(2)+','+y2.toFixed(2)+' L'+x3.toFixed(2)+','+y3.toFixed(2)+' A'+ri+','+ri+',0,0,0,'+x4.toFixed(2)+','+y4.toFixed(2)+'Z';
}
function ma(i){return (i+0.5)/n*2*Math.PI-Math.PI/2;}
function cp(r,i){var a=ma(i);return {x:CX+r*Math.cos(a),y:CY+r*Math.sin(a)};}

var wrap=document.getElementById('dial-wrap');
var svg=document.createElementNS(NS,'svg');
svg.setAttribute('viewBox','0 0 1000 1000');
svg.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;background:'+(isEncom?'#000000':'#09090f');
wrap.appendChild(svg);

var bg=document.createElementNS(NS,'circle');
bg.setAttribute('cx',CX);bg.setAttribute('cy',CY);bg.setAttribute('r',R_OUT+8);
bg.setAttribute('fill',BG_CIRCLE);svg.appendChild(bg);

function mkIco(p,x,y,s,c){
  var fo=document.createElementNS(NS,'svg');
  fo.setAttribute('x',(x-s/2).toFixed(1));fo.setAttribute('y',(y-s/2).toFixed(1));
  fo.setAttribute('width',s);fo.setAttribute('height',s);fo.setAttribute('viewBox','0 0 24 24');
  fo.style.pointerEvents='none';fo.style.overflow='visible';
  fo.setAttribute('fill',c);fo.setAttribute('color',c);fo.innerHTML=p;return fo;
}

var actSub=false,subG=null;

items.forEach(function(item,i){
  var pd=sp(i,R_OUT,R_IN);
  var c=cp(R_CENT,i);
  var isAct=item.key==='activity';
  var fb=isAct?ACT_FILL:SECTOR_FILL;
  var fh=isAct?ACT_HOVER:SECTOR_HOVER;
  var g=document.createElementNS(NS,'g');g.style.cursor='pointer';
  var p=document.createElementNS(NS,'path');
  p.setAttribute('d',pd);p.setAttribute('fill',fb);
  p.setAttribute('stroke',STROKE);p.setAttribute('stroke-width','2');
  p.style.transition='fill .15s';g.appendChild(p);
  g.appendChild(mkIco(ICONS[item.ico],c.x,c.y-20,52,item.color));
  var lb=document.createElementNS(NS,'text');
  lb.setAttribute('x',c.x.toFixed(1));lb.setAttribute('y',(c.y+34).toFixed(1));
  lb.setAttribute('text-anchor','middle');lb.setAttribute('font-size','17');
  lb.setAttribute('font-weight','600');lb.setAttribute('fill',TEXT_COLOR);
  lb.setAttribute('font-family','system-ui,-apple-system,sans-serif');
  lb.style.pointerEvents='none';lb.textContent=item.label;g.appendChild(lb);
  g.addEventListener('mouseover',function(){p.setAttribute('fill',fh);});
  g.addEventListener('mouseout',function(){p.setAttribute('fill',fb);});
  g.addEventListener('click',function(){
    if(isAct){actSub=!actSub;if(subG){subG.style.opacity=actSub?'1':'0';subG.style.pointerEvents=actSub?'all':'none';}}
    else{elegir(item.key);}
  });
  svg.appendChild(g);
});

var actA=ma(9),subSpan=Math.PI*0.55;
subG=document.createElementNS(NS,'g');
subG.style.opacity='0';subG.style.pointerEvents='none';subG.style.transition='opacity .2s';
subItems.forEach(function(item,j){
  var aS=actA-subSpan/2+j*subSpan/3,aE=actA-subSpan/2+(j+1)*subSpan/3;
  var x1=CX+R2_OUT*Math.cos(aS),y1=CY+R2_OUT*Math.sin(aS);
  var x2=CX+R2_OUT*Math.cos(aE),y2=CY+R2_OUT*Math.sin(aE);
  var x3=CX+R2_IN*Math.cos(aE),y3=CY+R2_IN*Math.sin(aE);
  var x4=CX+R2_IN*Math.cos(aS),y4=CY+R2_IN*Math.sin(aS);
  var pd='M'+x1.toFixed(2)+','+y1.toFixed(2)+' A'+R2_OUT+','+R2_OUT+',0,0,1,'+x2.toFixed(2)+','+y2.toFixed(2)+' L'+x3.toFixed(2)+','+y3.toFixed(2)+' A'+R2_IN+','+R2_IN+',0,0,0,'+x4.toFixed(2)+','+y4.toFixed(2)+'Z';
  var am=(aS+aE)/2,mx=CX+R2_CENT*Math.cos(am),my=CY+R2_CENT*Math.sin(am);
  var sg=document.createElementNS(NS,'g');sg.style.cursor='pointer';
  var sp2=document.createElementNS(NS,'path');
  sp2.setAttribute('d',pd);sp2.setAttribute('fill',SECTOR_FILL);
  sp2.setAttribute('stroke',STROKE);sp2.setAttribute('stroke-width','2');
  sp2.style.transition='fill .15s';sg.appendChild(sp2);
  sg.appendChild(mkIco(ICONS[item.ico],mx,my-22,52,item.color));
  var sl=document.createElementNS(NS,'text');
  sl.setAttribute('x',mx.toFixed(1));sl.setAttribute('y',(my+36).toFixed(1));
  sl.setAttribute('text-anchor','middle');sl.setAttribute('font-size','17');
  sl.setAttribute('font-weight','600');sl.setAttribute('fill',TEXT_COLOR);
  sl.setAttribute('font-family','system-ui');sl.style.pointerEvents='none';sl.textContent=item.label;
  sg.appendChild(sl);
  sg.addEventListener('mouseover',function(){sp2.setAttribute('fill',SECTOR_HOVER);});
  sg.addEventListener('mouseout',function(){sp2.setAttribute('fill',SECTOR_FILL);});
  sg.addEventListener('click',function(){elegir(item.key);});
  subG.appendChild(sg);
});
svg.appendChild(subG);

var cO=document.createElementNS(NS,'circle');
cO.setAttribute('cx',CX);cO.setAttribute('cy',CY);cO.setAttribute('r',RAW_R);
cO.setAttribute('fill',RAW_FILL);cO.setAttribute('stroke',RAW_STROKE);cO.setAttribute('stroke-width','3');
cO.style.cursor='pointer';cO.addEventListener('click',function(){elegir('nueva');});svg.appendChild(cO);
var cI=document.createElementNS(NS,'circle');
cI.setAttribute('cx',CX);cI.setAttribute('cy',CY);cI.setAttribute('r','96');
cI.setAttribute('fill','rgba(99,102,241,0.08)');cI.setAttribute('stroke','rgba(99,102,241,0.25)');cI.setAttribute('stroke-width','1.5');svg.appendChild(cI);
var cTx=document.createElementNS(NS,'text');
cTx.setAttribute('x',CX);cTx.setAttribute('y',CY-12);cTx.setAttribute('text-anchor','middle');
cTx.setAttribute('dominant-baseline','middle');cTx.setAttribute('font-size','54');
cTx.setAttribute('fill',RAW_TEXT);cTx.style.cursor='pointer';cTx.textContent='⇄';
cTx.addEventListener('click',function(){elegir('nueva');});svg.appendChild(cTx);
var cLb=document.createElementNS(NS,'text');
cLb.setAttribute('x',CX);cLb.setAttribute('y',CY+50);cLb.setAttribute('text-anchor','middle');
cLb.setAttribute('font-size','22');cLb.setAttribute('font-weight','700');cLb.setAttribute('fill',RAW_TEXT);
cLb.setAttribute('font-family','system-ui');cLb.style.cursor='pointer';cLb.textContent='RAW';
cLb.addEventListener('click',function(){elegir('nueva');});svg.appendChild(cLb);

document.addEventListener('keydown',function(e){if(e.key==='Escape')history.back();});
document.body.addEventListener('click',function(e){if(e.target===document.body)history.back();});
</script>
</body>
</html>
